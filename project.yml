name: iGest
options:
  bundleIdPrefix: com.igest
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

targets:
  iGest:
    type: application
    platform: macOS
    sources:
      - path: Sources/iGest
    settings:
      base:
        INFOPLIST_FILE: Sources/iGest/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.igest.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    entitlements:
      path: Sources/iGest/iGest.entitlements
      properties:
        com.apple.security.app-sandbox: false

  iGestTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/iGestTests
    dependencies:
      - target: iGest
    settings:
      base:
        SWIFT_VERSION: "5.9"
